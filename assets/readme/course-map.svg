<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="330" viewBox="0 0 1200 330" role="img" aria-labelledby="title desc">
  <title id="title">Five-part robotics course map</title><desc id="desc">The curriculum progresses from foundations through perception and VLA systems to deployment and production.</desc><rect width="1200" height="330" rx="24" fill="#f5f8fa"/><g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"><text x="56" y="60" fill="#11283a" font-size="30" font-weight="750">The learning path</text><text x="56" y="90" fill="#547184" font-size="17">Every phase contributes a working part of the final VLA system.</text></g><path d="M126 188h948" stroke="#9ab9c9" stroke-width="3"/><g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"><g transform="translate(70 128)"><circle cx="56" cy="60" r="36" fill="#113149"/><text x="56" y="66" text-anchor="middle" fill="#67ddff" font-size="22" font-weight="750">01</text><text x="56" y="126" text-anchor="middle" fill="#11283a" font-size="18" font-weight="750">Foundations</text><text x="56" y="151" text-anchor="middle" fill="#547184" font-size="15">tools &amp; VLMs</text></g><g transform="translate(290 128)"><circle cx="56" cy="60" r="36" fill="#113149"/><text x="56" y="66" text-anchor="middle" fill="#67ddff" font-size="22" font-weight="750">02</text><text x="56" y="126" text-anchor="middle" fill="#11283a" font-size="18" font-weight="750">Perception</text><text x="56" y="151" text-anchor="middle" fill="#547184" font-size="15">detect, depth, pose</text></g><g transform="translate(510 128)"><circle cx="56" cy="60" r="36" fill="#113149"/><text x="56" y="66" text-anchor="middle" fill="#67ddff" font-size="22" font-weight="750">03</text><text x="56" y="126" text-anchor="middle" fill="#11283a" font-size="18" font-weight="750">VLA systems</text><text x="56" y="151" text-anchor="middle" fill="#547184" font-size="15">fine-tune &amp; demos</text></g><g transform="translate(730 128)"><circle cx="56" cy="60" r="36" fill="#113149"/><text x="56" y="66" text-anchor="middle" fill="#67ddff" font-size="22" font-weight="750">04</text><text x="56" y="126" text-anchor="middle" fill="#11283a" font-size="18" font-weight="750">Deployment</text><text x="56" y="151" text-anchor="middle" fill="#547184" font-size="15">quantize &amp; evaluate</text></g><g transform="translate(950 128)"><circle cx="56" cy="60" r="36" fill="#113149"/><text x="56" y="66" text-anchor="middle" fill="#67ddff" font-size="22" font-weight="750">05</text><text x="56" y="126" text-anchor="middle" fill="#11283a" font-size="18" font-weight="750">Production</text><text x="56" y="151" text-anchor="middle" fill="#547184" font-size="15">package &amp; ship</text></g></g>
</svg>
