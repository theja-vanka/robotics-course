<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc">
  <title id="title">Robotics and Vision-Language-Action Course</title>
  <desc id="desc">A 30-day build-first robotics curriculum culminating in a vision-language-action policy for edge deployment.</desc>
  <rect width="1200" height="400" rx="28" fill="#07111d"/>
  <path d="M0 318H1200M0 358H1200M780 0V400M920 0V400M1060 0V400" stroke="#16344b" stroke-width="1"/>
  <g fill="none" stroke="#1d5273" stroke-width="1"><path d="M40 68H210l42 42h148"/><path d="M40 88h150l42 42h168"/><path d="M40 108h130l42 42h146"/><path d="M40 332h176l30-30h120"/><path d="M40 352h150l30-30h134"/></g>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"><text x="64" y="76" fill="#56d8ff" font-size="15" font-weight="700" letter-spacing="3">BUILD-FIRST ROBOTICS CURRICULUM</text><text x="64" y="144" fill="#f2f7fa" font-size="54" font-weight="750">Robotics &amp; VLA</text><text x="64" y="202" fill="#f2f7fa" font-size="54" font-weight="750">in 30 days</text><text x="64" y="248" fill="#a9c0cf" font-size="21">Learn by building a perception-to-policy system</text><text x="64" y="278" fill="#a9c0cf" font-size="21">that is fine-tuned, compressed, and deployed at the edge.</text></g>
  <g transform="translate(600 50)"><text x="0" y="-14" fill="#7fa2b7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" letter-spacing="1.5">CAPSTONE DATA PATH</text><path d="M84 70H154M246 70h70M408 70h70" stroke="#56d8ff" stroke-width="3" stroke-linecap="round"/><path d="m148 64 12 6-12 6m80-12 12 6-12 6m80-12 12 6-12 6m80-12 12 6-12 6" fill="none" stroke="#56d8ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" text-anchor="middle"><g transform="translate(0 40)"><rect width="84" height="60" rx="12" fill="#10273a" stroke="#2c6688"/><circle cx="42" cy="24" r="10" fill="none" stroke="#56d8ff" stroke-width="3"/><path d="M24 46c12-7 24-7 36 0" fill="none" stroke="#80a8c0" stroke-width="3"/><text x="42" y="122" fill="#c1d4df" font-size="14">observe</text></g><g transform="translate(162 40)"><rect width="84" height="60" rx="12" fill="#10273a" stroke="#2c6688"/><circle cx="30" cy="30" r="8" fill="#56d8ff"/><circle cx="54" cy="22" r="8" fill="#b4ecff"/><path d="M30 30 54 22" stroke="#56d8ff" stroke-width="3"/><text x="42" y="122" fill="#c1d4df" font-size="14">policy</text></g><g transform="translate(324 40)"><rect width="84" height="60" rx="12" fill="#10273a" stroke="#2c6688"/><path d="M24 22h36M24 32h36M24 42h36" stroke="#56d8ff" stroke-width="3"/><text x="42" y="122" fill="#c1d4df" font-size="14">compress</text></g><g transform="translate(486 40)"><rect width="84" height="60" rx="12" fill="#10273a" stroke="#2c6688"/><path d="M26 40 42 20l16 20M42 20v28" fill="none" stroke="#56d8ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="42" y="122" fill="#c1d4df" font-size="14">deploy</text></g></g><rect y="210" width="570" height="78" rx="14" fill="#0c1d2c" stroke="#214863"/><text x="24" y="240" fill="#56d8ff" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14">vla-edge/</text><text x="24" y="266" fill="#c5d5df" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17">A portfolio capstone that grows with every module.</text></g>
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13"><text x="64" y="350" fill="#7091a5">PYTHON · PYTORCH · PERCEPTION · VLMS · VLAS · EDGE ML</text><circle cx="64" cy="375" r="4" fill="#56d8ff"/><text x="78" y="380" fill="#a9c0cf">30 daily modules</text><circle cx="244" cy="375" r="4" fill="#56d8ff"/><text x="258" y="380" fill="#a9c0cf">one continuous capstone</text></g>
